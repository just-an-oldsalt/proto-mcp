name: Release

# Phase 7/E — tag-triggered release pipeline. On `git push <v*>` tag,
# build all five binaries on macOS, codesign with Developer ID,
# submit for notarization, and attach the signed zip to a GitHub
# release. Homebrew cask consumers download from there.
#
# Required repository secrets (configured in scripts/release-setup.md):
#
#   APPLE_DEVELOPER_ID_CERT_P12_BASE64
#     base64 of the .p12 export of the Developer ID Application
#     cert (private key + cert chain). Imported into a temporary
#     keychain at runtime; discarded with the runner.
#
#   APPLE_DEVELOPER_ID_CERT_PASSWORD
#     The .p12 export password.
#
#   APPLE_DEVELOPER_ID
#     The signing identity string:
#     "Developer ID Application: <NAME> (<TEAMID>)"
#
#   APPLE_NOTARY_APPLE_ID
#     Apple ID email used for notarytool submission.
#
#   APPLE_NOTARY_TEAM_ID
#     Developer Team ID (e.g. 346JJCHZP7).
#
#   APPLE_NOTARY_PASSWORD
#     App-specific password from appleid.apple.com, generated
#     specifically for notarytool. Stored verbatim.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create the release + upload assets

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      # The cert/key are imported into a transient keychain so the
      # runner's default login keychain stays untouched. The keychain
      # is unlocked, allow-listed for codesign, then deleted in the
      # post-step regardless of success/failure.
      - name: Import Developer ID cert
        env:
          CERT_P12_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          # Random keychain password — never reused, lifecycle == job.
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          # Decode the .p12.
          echo "$CERT_P12_B64" | base64 --decode > /tmp/cert.p12

          # Create the transient keychain.
          KEYCHAIN_PATH="$RUNNER_TEMP/protonmcp-release.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make our keychain the SEARCH default so codesign finds the
          # cert. Login keychain stays in the search list as fallback.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import + allow codesign to use the cert without prompting.
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f /tmp/cert.p12

          # Sanity: confirm the cert is visible.
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials protonmcp-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build all binaries
        run: make all

      - name: Sign
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: make sign

      - name: Verify signatures
        run: make verify-sign

      - name: Notarize
        run: make notarize

      - name: Verify notarization
        # Online lookup can take a beat after notarytool returns
        # Accepted; one retry handles flakiness without hiding real
        # rejections.
        run: |
          set -e
          if ! make verify-notarized; then
            echo "First verify-notarized attempt failed; waiting 30s for Apple to propagate ticket..."
            sleep 30
            make verify-notarized
          fi

      - name: Package release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$RUNNER_TEMP/protonmcp-$VERSION"
          mkdir -p "$STAGE"

          # Lay out as a single flat directory — the Homebrew cask
          # `binary` stanzas pull each file directly from the
          # extracted root. helpers/ subdirs aren't preserved; the
          # path-resolution code looks in the same dir as the
          # running binary (Phase 7/E layout) as well as the dev
          # layout.
          cp bin/protonmcp        "$STAGE/protonmcp"
          cp bin/protonmcpd       "$STAGE/protonmcpd"
          cp bin/protonmcp-shim   "$STAGE/protonmcp-shim"
          cp helpers/touchid/protonmcp-touchid     "$STAGE/protonmcp-touchid"
          cp helpers/lockwatch/protonmcp-lockwatch "$STAGE/protonmcp-lockwatch"
          cp LICENSE README.md SECURITY.md "$STAGE/"

          # Tarball (Homebrew prefers .tar.gz for casks-of-binaries;
          # also gives us a deterministic sha256 to bake into the
          # cask formula).
          cd "$RUNNER_TEMP"
          tar -czf "protonmcp-$VERSION.tar.gz" "protonmcp-$VERSION"
          shasum -a 256 "protonmcp-$VERSION.tar.gz" > "protonmcp-$VERSION.tar.gz.sha256"

          echo "STAGE_DIR=$STAGE" >> "$GITHUB_ENV"
          echo "ARTIFACT_TGZ=$RUNNER_TEMP/protonmcp-$VERSION.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_SHA=$RUNNER_TEMP/protonmcp-$VERSION.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # body comes from the tag's annotation, or the repo's
          # CHANGELOG if you maintain one; for now leave blank and
          # let the maintainer fill it in via gh release edit.
          files: |
            ${{ env.ARTIFACT_TGZ }}
            ${{ env.ARTIFACT_SHA }}
          draft: true   # let the maintainer review before going live
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: |
          set +e
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
