name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin to the Go version Bridge uses (and which our toolchain
          # line in go.mod already declares). Matching avoids surprises
          # from stdlib differences across versions.
          go-version: "1.26.x"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: build touchid helper
        # Phase 4/C — the Swift helper for Touch ID prompts. macos-14
        # has swiftc preinstalled. We verify it BUILDS here even
        # though no Go test exercises it; the broker tests use a
        # POSIX shell-script fixture so they're fast and don't need
        # biometric hardware.
        run: make touchid

      - name: go test
        run: go test -race ./...

  vulncheck:
    # macOS runner because internal/keystore depends on keybase/go-keychain
    # which is a cgo wrapper over Security.framework — Linux can't link
    # the symbols, so govulncheck's `loading packages` step fails before
    # it gets to the vulnerability scan.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # NOTE: golangci-lint job is intentionally absent. v1.64.8 (the latest
  # v1 release as of 2026-05) was built with Go 1.24 and refuses to load
  # configs targeting Go 1.26 ("the Go language version used to build
  # golangci-lint is lower than the targeted Go version"). v2.x is a
  # rewrite with breaking config-schema changes. Adding lint back is
  # tracked as a Phase-1.5 follow-up — either pin a v2 build that
  # supports 1.26 and rewrite .golangci.yml, or wait for golangci-lint
  # to ship a 1.26-built v1 patch release.
