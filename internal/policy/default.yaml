# proto-mcp default policy.
#
# Embedded into the binary via //go:embed. Override by writing your
# own policy.yaml at ~/Library/Application Support/protonmcp/.
# Override blocks REPLACE the default block per tool — they do NOT
# field-by-field merge. Forgetting to carry over `confirm: true` is
# a footgun we deliberately surface.
#
# decision values: allow | prompt | deny
#   allow:  handler runs immediately, no UI.
#   prompt: Touch ID approval required first. If confirm: true,
#           an NSAlert showing the literal operation details runs
#           before Touch ID.
#   deny:   handler never runs, audit row outcome=denied.
#
# ttl: how long an approval is cached before re-prompting. ttl: 0
# means always re-prompt — appropriate for irreversible operations
# like mail_send.
#
# allowed_recipients / description: forward-compat fields parsed in
# Phase 4, enforced in Phase 5. Leave them in.

defaults:
  decision: deny  # SECURITY Foundational #4 — unknown tools always deny

# Phase 8/A — per-attachment size ceiling. Refuses downloads /
# uploads larger than this number of bytes BEFORE making the
# network call. 25 MiB matches what most free email providers
# also cap at. The cache also has a hardcoded 500 MiB total
# ceiling in internal/store/attachments.go (oldest cached_at
# evicted first); that's not user-configurable in v1.
max_attachment_bytes: 26214400

tools:
  # Phase 3 read tools — all allow.
  account_whoami:        { decision: allow }
  mail_list:             { decision: allow }
  mail_search:           { decision: allow }
  mail_read:             { decision: allow }
  mail_read_thread:      { decision: allow }
  mail_list_attachments: { decision: allow }
  # Phase 8/A — decrypts and returns the bytes of a single
  # attachment. Cached locally for 30 days after first download
  # (same retention as body cache). Re-prompts after the 5-minute
  # TTL window so a busy LLM doesn't re-Touch-ID per attachment
  # in the same conversation.
  mail_download_attachment:
    decision: prompt
    ttl: 5m
    description: "Download and decrypt one attachment from a Proton message. Cached locally for 30 days; subsequent calls within the TTL window don't re-prompt."
  # Phase 8/C — writes a file to ~/Downloads. Filesystem side
  # effect: confirm: true + ttl: 0 means every save re-asks (no
  # cached approval — the user reads the literal filename before
  # they approve each save).
  mail_save_attachment:
    decision: prompt
    confirm: true
    ttl: 0
    description: "Save a decrypted attachment to ~/Downloads with a sanitized filename. Refuses paths outside ~/Downloads. Existing files get a (2), (3), ... suffix."
  labels_list:           { decision: allow }
  folders_list:          { decision: allow }
  mail_sync:             { decision: allow }

  # Phase 5 write tools — stubbed today so Decide doesn't fall
  # through to the default-deny fallback once those handlers register.
  # Active enforcement of allowed_recipients / rate_limit lands in Phase 5.
  mail_draft_create:
    decision: allow
    description: "Create a draft (no external effect)"
  mail_draft_update:
    decision: allow
    description: "Update a draft"
  mail_draft_delete:
    decision: prompt
    ttl: 5m
    description: "Delete a draft"
  # D35 fix — mail_draft_list was missing from this stub list so it
  # fell through to the default-deny fallback, while the equivalent
  # `mail_list folder=drafts` worked fine. Same data, two paths,
  # contradictory gating. Both are envelope listings (no body
  # decrypt); mail_list is allow, so mail_draft_list matches.
  mail_draft_list:
    decision: allow
    description: "List drafts (envelope-only, same data as mail_list folder=drafts)"
  mail_send:
    decision: prompt
    confirm: true
    ttl: 0
    allowed_recipients: []
    description: "Send a message via Proton"
  mail_send_draft:
    decision: prompt
    confirm: true
    ttl: 0
    allowed_recipients: []
    description: "Send an existing draft (recipients come from the draft)"
  mail_reply:
    decision: prompt
    confirm: true
    ttl: 0
    allowed_recipients: []
    description: "Reply to a message"
  mail_reply_all:
    decision: prompt
    confirm: true
    ttl: 0
    allowed_recipients: []
    description: "Reply-all to a message"
  mail_forward:
    decision: prompt
    confirm: true
    ttl: 0
    allowed_recipients: []
    description: "Forward a message"
  mail_move:
    decision: prompt
    ttl: 5m
    description: "Move a message to a folder"
  mail_label:
    decision: prompt
    ttl: 5m
    description: "Add or remove a label"
  mail_mark_read:
    decision: allow
    description: "Mark messages as read (reversible)"
  mail_mark_unread:
    decision: allow
    description: "Mark messages as unread (reversible)"
  mail_trash:
    decision: prompt
    ttl: 5m
    description: "Move a message to trash (reversible via mail_move)"
  mail_delete_permanent:
    decision: deny
    description: "Permanently delete — opt-in only, override required"

  # Label / folder CRUD.
  labels_create:
    decision: prompt
    ttl: 5m
    description: "Create a new label"
  labels_update:
    decision: prompt
    ttl: 5m
    description: "Rename or recolor a label"
  labels_delete:
    decision: prompt
    confirm: true
    ttl: 0
    description: "Delete a label"
  folders_create:
    decision: prompt
    ttl: 5m
    description: "Create a new folder"
  folders_update:
    decision: prompt
    ttl: 5m
    description: "Rename or recolor a folder"
  folders_delete:
    decision: prompt
    confirm: true
    ttl: 0
    description: "Delete a folder"
